    "@context": "https://schema.org",
    "@type": "WebApplication",

<body>
  <div id="map"></div>

  <!-- 左上：台风数据面板（可收起） -->
  <aside id="panel">
    <div id="panel-head">
      <h1>台风数据</h1>
      <button id="panel-toggle" title="收起/展开">«</button>
    </div>
    <div id="panel-body">
      <div id="storm-list"></div>
      <section>
        <h2>预报机构</h2>
        <div id="agency-toggles"></div>
      </section>
      <section>
        <h2>强度图例</h2>
        <div id="legend"></div>
      </section>
      <section id="hindcast-section" hidden>
        <h2>AI 预报复盘</h2>
        <div id="hindcast"></div>
      </section>
      <footer id="meta"></footer>
    </div>
  </aside>

  <!-- 底部：我会不会受灾（分步向导，可收起） -->
  <section id="impact-dock">
    <button id="dock-bar"></button>
    <div id="dock-body" hidden>

      <div class="wiz-step" id="step-region" hidden>
        <div class="wiz-title">你在哪里？<span class="wiz-num">1/3</span></div>
        <div id="loc-row">
          <select id="sel-prov"></select>
          <select id="sel-city"></select>
          <select id="sel-dist"></select>
          <button id="btn-geo" title="使用我的位置">定位</button>
        </div>
        <div class="wiz-nav"><span></span><button class="wiz-next" data-to="persona">下一步 →</button></div>
      </div>

      <div class="wiz-step" id="step-persona" hidden>
        <div class="wiz-title">你是哪类人群？<span class="wiz-num">2/3</span></div>
        <div id="persona-row"></div>
        <div class="wiz-nav">
          <button class="wiz-back" data-to="region">← 上一步</button>
          <button class="wiz-next" data-to="sit">下一步 →</button>
        </div>
      </div>

      <div class="wiz-step" id="step-sit" hidden>
        <div class="wiz-title">你身处的环境（可多选）<span class="wiz-num">3/3</span></div>
        <div id="situation-row"></div>
        <div class="wiz-nav">
          <button class="wiz-back" data-to="persona">← 上一步</button>
          <button class="wiz-next" data-to="result">查看结果 →</button>
        </div>
      </div>

      <div class="wiz-step" id="step-result" hidden>
        <div id="impact-summary"></div>
        <details id="d-timeline"><summary>时间线</summary><div></div></details>
        <details id="d-analog"><summary>历史对照</summary><div></div></details>
        <details id="d-checklist" open><summary>现在该做的</summary><div></div></details>
        <div class="wiz-nav">
          <button class="wiz-back" data-to="region">重新设置</button>
          <button id="share-btn">生成分享卡片</button>
        </div>
        <footer id="disclaimer-mini">
          非官方预警，以气象与应急部门发布为准；涉撤离听从当地政府安排。雨量与风力峰值为数值模式预报（Open-Meteo），存在不确定性。<br>公益项目 · 发起 <b>日成Risen</b>
        </footer>
      </div>

    </div>
  </section>

  <div id="share-modal">
    <div id="share-box">
      <canvas id="share-canvas"></canvas>
      <div id="share-actions">
        <button id="share-save">保存图片</button>
        <button id="share-close">关闭</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <script src="panel.js?v=40"></script>
  <script src="app.js?v=40"></script>

</body>
</html>
